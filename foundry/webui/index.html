<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Retail Router — Azure × Snowflake</title>
<style>
  :root{
    --navy:#1E2761; --ice:#CADCFC; --snow:#29B5E8; --fabric:#117865;
    --bg:#0d1230; --card:#161c44; --muted:#9aa3c7; --line:#2a3162;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Calibri,sans-serif;background:
       radial-gradient(1200px 600px at 80% -10%, #25307a 0%, var(--bg) 55%);
       color:#eef1ff;height:100vh;display:flex;flex-direction:column}
  header{padding:18px 28px;border-bottom:1px solid var(--line);display:flex;
         align-items:center;gap:16px;background:rgba(13,18,48,.6);backdrop-filter:blur(6px)}
  header .logo{width:42px;height:42px;border-radius:12px;background:
       conic-gradient(from 220deg,var(--snow),var(--fabric),var(--navy),var(--snow));}
  header h1{font-size:20px;margin:0;font-weight:700}
  header p{margin:2px 0 0;color:var(--muted);font-size:13px}
  .pill{margin-left:auto;font-size:12px;color:var(--muted);border:1px solid var(--line);
        padding:6px 12px;border-radius:20px}
  .lang{display:flex;gap:4px;margin-left:14px}
  .lang button{background:transparent;border:1px solid var(--line);color:var(--muted);
        border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer}
  .lang button.on{background:var(--snow);color:#03122a;border-color:var(--snow)}
  main{flex:1;overflow-y:auto;padding:24px 0}
  .wrap{max-width:880px;margin:0 auto;padding:0 24px}
  .msg{margin:14px 0;display:flex;gap:12px;animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .msg .av{width:34px;height:34px;border-radius:10px;flex:none;display:flex;
           align-items:center;justify-content:center;font-size:16px;font-weight:700}
  .user .av{background:var(--navy);color:#fff}
  .bot  .av{background:linear-gradient(135deg,var(--snow),var(--fabric));color:#03122a}
  .bub{background:var(--card);border:1px solid var(--line);border-radius:14px;
       padding:12px 16px;line-height:1.55;font-size:15px;white-space:pre-wrap;max-width:760px}
  .user .bub{background:#222a5e}
  .route{display:flex;gap:8px;margin:0 0 8px 46px}
  .tag{font-size:11px;font-weight:700;letter-spacing:.3px;padding:4px 10px;border-radius:20px}
  .tag.snow{background:rgba(41,181,232,.15);color:var(--snow);border:1px solid var(--snow)}
  .tag.fabric{background:rgba(17,120,101,.18);color:#3fd0b0;border:1px solid var(--fabric)}
  .tag.foundry{background:rgba(202,220,252,.12);color:var(--ice);border:1px solid var(--ice)}
  details.sql{margin:8px 0 0 46px;max-width:760px}
  details.sql summary{cursor:pointer;color:var(--muted);font-size:12px}
  details.sql pre{background:#0a0e26;border:1px solid var(--line);border-radius:10px;
       padding:12px;overflow:auto;font-size:12px;color:#bfe9ff;margin:6px 0 0}
  footer{border-top:1px solid var(--line);background:rgba(13,18,48,.7);padding:14px 0}
  .composer{max-width:880px;margin:0 auto;padding:0 24px;display:flex;gap:10px}
  textarea{flex:1;resize:none;background:var(--card);border:1px solid var(--line);
       color:#fff;border-radius:14px;padding:14px 16px;font-size:15px;font-family:inherit;height:52px}
  textarea:focus{outline:none;border-color:var(--snow)}
  button{background:linear-gradient(135deg,var(--snow),var(--navy));color:#fff;border:0;
       border-radius:14px;padding:0 22px;font-weight:700;font-size:15px;cursor:pointer}
  button:disabled{opacity:.5;cursor:wait}
  .chips{max-width:880px;margin:10px auto 0;padding:0 24px;display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-size:12px;color:var(--ice);border:1px solid var(--line);background:rgba(255,255,255,.03);
       padding:6px 12px;border-radius:20px;cursor:pointer}
  .chip:hover{border-color:var(--snow)}
  .dots span{animation:blink 1.2s infinite both}
  .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
</style>
</head>
<body>
<header>
  <div class="logo"></div>
  <div>
    <h1>Retail Router</h1>
    <p id="subtitle">Microsoft Foundry Orchestration — Microscope <b>Snowflake</b> · Telescope <b>Fabric</b></p>
  </div>
  <div class="pill">gpt-4o · compute : RETAIL_COMPUTE_WH · agent : Retail-Router-Azure-x-Snowflake</div>
  <div class="lang">
    <button id="lang-fr">FR</button>
    <button id="lang-en">EN</button>
  </div>
</header>

<main>
  <div class="wrap" id="thread">
    <div class="route"><span class="tag foundry">FOUNDRY</span></div>
    <div class="msg bot"><div class="av">&#9670;</div><div class="bub" id="greeting"></div></div>
  </div>
</main>

<div class="chips" id="chips"></div>

<footer>
  <div class="composer">
    <textarea id="q" autofocus></textarea>
    <button id="send">Send</button>
  </div>
</footer>

<script>
const I18N = {
  fr: {
    subtitle: 'Orchestration Microsoft Foundry — Microscope <b>Snowflake</b> · Télescope <b>Fabric</b>',
    greeting: 'Bonjour \uD83D\uDC4B Je suis l\u2019orchestrateur Retail. Posez une question : je route automatiquement vers <b>Snowflake</b> (détail client/commande) ou <b>Fabric</b> (KPI agrégés, régions, segments).',
    placeholder: 'ex : Donne-moi la fiche du client le plus dépensier...',
    send: 'Envoyer',
    sqlLabel: 'Voir le SQL généré par Cortex (Snowflake)',
    snow: '❄ SNOWFLAKE (détail · RETAIL_COMPUTE_WH)', fabric: '🔭 FABRIC (agrégé)',
    suggestions: [
      "Donne-moi la fiche du client le plus dépensier : nom, ville, segment, total dépensé et nombre de commandes.",
      "Quelles sont les 3 meilleures régions par chiffre d'affaires ?",
      "Liste les commandes annulées avec leurs montants.",
      "Quel est le panier moyen par segment client (Premium, Standard, Bronze) ?",
      "Qui est notre meilleur client à Grenoble, et comment le CA de sa région se compare-t-il au national ?"
    ]
  },
  en: {
    subtitle: 'Microsoft Foundry Orchestration — Microscope <b>Snowflake</b> · Telescope <b>Fabric</b>',
    greeting: 'Hello \uD83D\uDC4B I am the Retail Orchestrator. Ask a question: I automatically route to <b>Snowflake</b> (customer/order detail) or <b>Fabric</b> (aggregated KPIs, regions, segments).',
    placeholder: 'e.g.: Give me the profile of the highest-spending customer...',
    send: 'Send',
    sqlLabel: 'View the SQL generated by Cortex (Snowflake)',
    snow: '❄ SNOWFLAKE (detailed · RETAIL_COMPUTE_WH)', fabric: '🔭 FABRIC (aggregated)',
    suggestions: [
      "Give me the profile of the highest-spending customer: name, city, segment, total spent and number of orders.",
      "What are the top 3 regions by revenue?",
      "List cancelled orders with their amounts.",
      "What is the average basket per customer segment (Premium, Standard, Bronze)?",
      "Who is our best customer in Grenoble, and how does their region's revenue compare nationally?"
    ]
  }
};
let LANG = localStorage.getItem('lang') || 'fr';
const thread = document.getElementById('thread');
const chips  = document.getElementById('chips');
const q = document.getElementById('q');
const send = document.getElementById('send');
const main = document.querySelector('main');

function applyLang(){
  const t = I18N[LANG];
  document.documentElement.lang = LANG;
  document.getElementById('subtitle').innerHTML = t.subtitle;
  document.getElementById('greeting').innerHTML = t.greeting;
  q.placeholder = t.placeholder;
  send.textContent = t.send;
  document.getElementById('lang-fr').classList.toggle('on', LANG==='fr');
  document.getElementById('lang-en').classList.toggle('on', LANG==='en');
  chips.innerHTML='';
  t.suggestions.forEach(s=>{
    const c=document.createElement('div');c.className='chip';
    c.textContent = s.length>52 ? s.slice(0,52)+'…' : s;
    c.title=s; c.onclick=()=>{q.value=s;q.focus();};
    chips.appendChild(c);
  });
}
document.getElementById('lang-fr').onclick=()=>{LANG='fr';localStorage.setItem('lang',LANG);applyLang();};
document.getElementById('lang-en').onclick=()=>{LANG='en';localStorage.setItem('lang',LANG);applyLang();};
applyLang();

function scrollDown(){ main.scrollTop = main.scrollHeight; }

function bubble(text, who){
  const m=document.createElement('div');m.className='msg '+who;
  m.innerHTML='<div class="av">'+(who==='user'?'Q':'&#9670;')+'</div><div class="bub"></div>';
  m.querySelector('.bub').textContent=text;
  thread.appendChild(m);scrollDown();
  return m;
}
function routeTags(agents){
  const r=document.createElement('div');r.className='route';
  r.innerHTML='<span class="tag foundry">FOUNDRY route →</span>';
  (agents||[]).forEach(a=>{
    const t=document.createElement('span');
    t.className='tag '+(a==='snowflake'?'snow':'fabric');
    t.textContent=a==='snowflake'?I18N[LANG].snow:I18N[LANG].fabric;
    r.appendChild(t);
  });
  thread.appendChild(r);scrollDown();
}

async function ask(question){
  bubble(question,'user');
  q.value='';send.disabled=true;
  const loading=bubble('','bot');
  loading.querySelector('.bub').innerHTML='<span class="dots"><span>●</span><span>●</span><span>●</span></span>';
  scrollDown();
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question,lang:LANG})});
    const d=await r.json();
    loading.remove();
    if(d.error){bubble('⚠ '+d.error,'bot');}
    else{
      routeTags(d.agents);
      bubble(d.answer,'bot');
      if(d.sql){
        const det=document.createElement('details');det.className='sql';
        det.innerHTML='<summary>'+I18N[LANG].sqlLabel+'</summary><pre></pre>';
        det.querySelector('pre').textContent=d.sql;
        thread.appendChild(det);scrollDown();
      }
    }
  }catch(e){loading.remove();bubble('⚠ '+e,'bot');}
  send.disabled=false;scrollDown();
}

send.onclick=()=>{if(q.value.trim())ask(q.value.trim());};
q.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(q.value.trim())ask(q.value.trim());}});
</script>
</body>
</html>
